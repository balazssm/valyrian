<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valyrian Admin Panel</title>

<style>
:root {
    --bg:#0f0f0f;
    --card:#1a1a1a;
    --text:#e0e0e0;
    --gold:#f1c40f;
    --green:#27ae60;
    --red:#e74c3c;
}

body {
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

h1 {
    text-align:center;
    color:var(--gold);
    padding:20px;
    border-bottom:2px solid #222;
}

.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card {
    background:var(--card);
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th,td {
    padding:10px;
    border-bottom:1px solid #333;
}

.status-pending { color:orange; }
.status-approved { color:var(--green); }
.status-rejected { color:var(--red); }

button {
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.approve { background:var(--green); color:white; }
.reject { background:var(--red); color:white; }

select {
    background:#222;
    color:white;
    padding:5px;
    border-radius:5px;
}

.badge {
    padding:4px 8px;
    border-radius:4px;
    font-size:12px;
    font-weight:bold;
}

.badge-vip { background:#f1c40f; color:black; }
.badge-kiemelt { background:#2ecc71; color:black; }
.badge-kiemeltp { background:#e67e22; color:black; }
.badge-player { background:#7f8c8d; color:white; }
.badge-mod { background:#3498db; color:white; }
.badge-admin { background:#9b59b6; color:white; }
.badge-owner { background:#e74c3c; color:white; }

#error {
    color:red;
    text-align:center;
}
</style>
</head>

<body>

<h1>⚡ Valyrian Admin Panel</h1>

<div class="container">

<div class="card">
<h2>📦 Rendelések</h2>
<div id="error"></div>

<select onchange="loadOrders(this.value)">
    <option value="">Összes</option>
    <option value="pending">Függőben</option>
    <option value="approved">Elfogadva</option>
    <option value="rejected">Elutasítva</option>
</select>

<table>
<thead>
<tr>
<th>OrderID</th>
<th>User</th>
<th>Item</th>
<th>Ár</th>
<th>Status</th>
<th>Művelet</th>
</tr>
</thead>
<tbody id="orders"></tbody>
</table>
</div>

<div class="card">
<h2>👤 Felhasználók</h2>

<table>
<thead>
<tr>
<th>User</th>
<th>Rank</th>
<th>Whitelista</th>
<th>Rank váltás</th>
</tr>
</thead>

<tbody id="users"></tbody>
</table>
</div>

</div>

<script>
const TOKEN = localStorage.getItem("valyrian_token");

// ─────────────────────────────
// ORDERS BETÖLTÉS (FIX)
// ─────────────────────────────
async function loadOrders(status=""){
    const err = document.getElementById("error");

    try {
        const res = await fetch(
            "/api/purchase/orders" + (status ? `?status=${status}` : ""),
            {
                headers: {
                    Authorization: `Bearer ${TOKEN}`
                }
            }
        );

        if (!res.ok) {
            const txt = await res.text();
            err.innerText = "Hiba: " + res.status + " - " + txt;
            return;
        }

        const data = await res.json();
        const tbody = document.getElementById("orders");
        tbody.innerHTML = "";

        data.forEach(o => {
            tbody.innerHTML += `
            <tr>
                <td>${o.orderId}</td>
                <td>${o.username}</td>
                <td>${o.item}</td>
                <td>${o.priceHuf} Ft</td>
                <td class="status-${o.status}">${o.status}</td>
                <td>
                    ${o.status === "pending" ? `
                        <button class="approve" onclick="approve('${o._id}')">Elfogad</button>
                        <button class="reject" onclick="reject('${o._id}')">Elutasít</button>
                    ` : ""}
                </td>
            </tr>`;
        });

    } catch (e) {
        err.innerText = "Hálózati hiba!";
        console.error(e);
    }
}

// ─────────────────────────────
// APPROVE / REJECT (FIX)
// ─────────────────────────────
async function approve(id){
    const res = await fetch(`/api/purchase/${id}/approve`, {
        method:"PUT",
        headers:{
            Authorization:`Bearer ${TOKEN}`
        }
    });

    if (!res.ok) {
        alert("Nem sikerült jóváhagyni!");
        return;
    }

    loadOrders();
}

async function reject(id){
    await fetch(`/api/purchase/${id}/reject`, {
        method:"PUT",
        headers:{
            Authorization:`Bearer ${TOKEN}`
        }
    });

    loadOrders();
}

// ─────────────────────────────
// USERS (rank FIX + badge FIX)
// ─────────────────────────────
async function loadUsers(){
    const res = await fetch("/api/admin/users", {
        headers:{ Authorization:`Bearer ${TOKEN}` }
    });

    const users = await res.json();
    const tbody = document.getElementById("users");
    tbody.innerHTML = "";

    users.forEach(u => {

        const badge = `badge-${u.rank}`;

        tbody.innerHTML += `
        <tr>
            <td>${u.username}</td>
            <td><span class="badge ${badge}">${u.rank}</span></td>

            <td>
                <select onchange="updateWL('${u._id}', this.value)">
                    <option value="none">none</option>
                    <option value="pending">pending</option>
                    <option value="approved">approved</option>
                    <option value="rejected">rejected</option>
                </select>
            </td>

            <td>
                <select onchange="updateRank('${u._id}', this.value)">
                    <option value="player">Player</option>
                    <option value="vip">VIP</option>
                    <option value="kiemelt">Kiemelt</option>
                    <option value="kiemeltp">Kiemelt+</option>
                    <option value="mod">Mod</option>
                    <option value="admin">Admin</option>
                    <option value="owner">Tulajdonos</option>
                </select>
            </td>
        </tr>`;
    });
}

// ─────────────────────────────
// FIX: RANK UPDATE BUG FIX
// ─────────────────────────────
async function updateRank(id, rank){
    const res = await fetch(`/api/admin/users/${id}/rank`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            Authorization:`Bearer ${TOKEN}`
        },
        body: JSON.stringify({ rank })
    });

    if (!res.ok) {
        alert("Rank váltás sikertelen!");
        return;
    }

    loadUsers();
}

// whitelist
async function updateWL(id, val){
    await fetch(`/api/admin/users/${id}/whitelist`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            Authorization:`Bearer ${TOKEN}`
        },
        body: JSON.stringify({ whitelistStatus: val })
    });
}

// INIT
loadOrders();
loadUsers();
</script>

</body>
</html>
