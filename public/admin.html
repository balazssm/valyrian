<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valyrian Admin Dashboard</title>

<style>
:root {
    --bg:#0f0f0f;
    --card:#1a1a1a;
    --text:#e0e0e0;
    --gold:#f1c40f;
    --green:#27ae60;
    --red:#e74c3c;
    --blue:#3498db;
}

body {
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

header {
    padding:20px;
    text-align:center;
    border-bottom:2px solid #222;
}

h1 { color:var(--gold); }

.tabs {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
}

button {
    padding:10px 15px;
    border:none;
    cursor:pointer;
    background:#222;
    color:white;
    border-radius:6px;
}

button.active { background:var(--gold); color:black; }

.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card {
    background:var(--card);
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th,td {
    padding:10px;
    border-bottom:1px solid #333;
    text-align:left;
}

.status-pending { color:orange; }
.status-approved { color:var(--green); }
.status-rejected { color:var(--red); }

.btn {
    padding:5px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.btn-approve { background:var(--green); color:white; }
.btn-reject { background:var(--red); color:white; }

select {
    padding:5px;
    background:#222;
    color:white;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
<h1>⚡ Valyrian Admin Dashboard</h1>
</header>

<div class="tabs">
<button onclick="showTab('orders')" class="active">📦 Orders</button>
<button onclick="showTab('users')">👤 Users</button>
</div>

<div class="container">

<!-- ORDERS -->
<div id="ordersTab">
    <div class="card">
        <h2>Rendelések</h2>
        <select onchange="loadOrders(this.value)">
            <option value="">Összes</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
        </select>

        <table>
            <thead>
                <tr>
                    <th>Order</th>
                    <th>User</th>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="orders"></tbody>
        </table>
    </div>
</div>

<!-- USERS -->
<div id="usersTab" style="display:none;">
    <div class="card">
        <h2>Felhasználók</h2>

        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Rank</th>
                    <th>Whitelist</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="users"></tbody>
        </table>
    </div>
</div>

</div>

<script>
const TOKEN = localStorage.getItem("valyrian_token");

// TAB
function showTab(tab){
    document.getElementById("ordersTab").style.display = tab==="orders"?"block":"none";
    document.getElementById("usersTab").style.display = tab==="users"?"block":"none";
}

// ─────────────────────────────
// ORDERS
// ─────────────────────────────
async function loadOrders(status=""){
    const res = await fetch("/api/purchase/orders"+(status?`?status=${status}`:""), {
        headers:{ Authorization:`Bearer ${TOKEN}` }
    });

    const data = await res.json();
    const tbody = document.getElementById("orders");

    tbody.innerHTML = "";

    data.forEach(o=>{
        tbody.innerHTML += `
        <tr>
            <td>${o.orderId}</td>
            <td>${o.username}</td>
            <td>${o.item}</td>
            <td>${o.priceHuf} Ft</td>
            <td class="status-${o.status}">${o.status}</td>
            <td>
                ${o.status==="pending" ? `
                <button class="btn btn-approve" onclick="approve('${o._id}')">Approve</button>
                <button class="btn btn-reject" onclick="reject('${o._id}')">Reject</button>
                `:""}
            </td>
        </tr>
        `;
    });
}

async function approve(id){
    await fetch(`/api/purchase/${id}/approve`, {
        method:"PUT",
        headers:{ Authorization:`Bearer ${TOKEN}` }
    });
    loadOrders();
}

async function reject(id){
    await fetch(`/api/purchase/${id}/reject`, {
        method:"PUT",
        headers:{ Authorization:`Bearer ${TOKEN}` }
    });
    loadOrders();
}

// ─────────────────────────────
// USERS
// ─────────────────────────────
async function loadUsers(){
    const res = await fetch("/api/admin/users", {
        headers:{ Authorization:`Bearer ${TOKEN}` }
    });

    const data = await res.json();
    const tbody = document.getElementById("users");

    tbody.innerHTML = "";

    data.forEach(u=>{
        tbody.innerHTML += `
        <tr>
            <td>${u.username}</td>
            <td>${u.rank}</td>
            <td>
                <select onchange="updateWL('${u._id}', this.value)">
                    <option value="none" ${u.whitelistStatus==="none"?"selected":""}>none</option>
                    <option value="pending" ${u.whitelistStatus==="pending"?"selected":""}>pending</option>
                    <option value="approved" ${u.whitelistStatus==="approved"?"selected":""}>approved</option>
                    <option value="rejected" ${u.whitelistStatus==="rejected"?"selected":""}>rejected</option>
                </select>
            </td>
            <td>
                <select onchange="updateRank('${u._id}', this.value)">
                    <option value="player">Player</option>
                    <option value="vip">VIP</option>
                    <option value="kiemelt">Kiemelt</option>
                    <option value="kiemeltp">Kiemelt+</option>
                    <option value="mod">Mod</option>
                    <option value="admin">Admin</option>
                    <option value="owner">Owner</option>
                </select>
            </td>
        </tr>
        `;
    });
}

async function updateWL(id, value){
    await fetch(`/api/admin/users/${id}/whitelist`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            Authorization:`Bearer ${TOKEN}`
        },
        body: JSON.stringify({ whitelistStatus:value })
    });
}

async function updateRank(id, rank){
    await fetch(`/api/admin/users/${id}/rank`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            Authorization:`Bearer ${TOKEN}`
        },
        body: JSON.stringify({ rank })
    });

    loadUsers();
}

// INIT
loadOrders();
loadUsers();
</script>

</body>
</html>
